name: lab04-diffusers-cpg-streaming

services:
  neo4j:
    image: neo4j:5.26
    container_name: lab04-neo4j
    restart: unless-stopped

    ports:
      # Neo4j Browser
      - "7474:7474"

      # Bolt connection
      - "7687:7687"

    environment:
      NEO4J_AUTH: "neo4j/${NEO4J_PASSWORD}"

    volumes:
      # Lưu dữ liệu database
      - neo4j_data:/data

      # Lưu log Neo4j
      - neo4j_logs:/logs

volumes:
  neo4j_data:
  neo4j_logs: